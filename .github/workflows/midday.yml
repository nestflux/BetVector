# ============================================================================
# BetVector — Midday Pipeline (E13-01)
# ============================================================================
name: Midday Pipeline

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      verbose:
        description: "Enable verbose (DEBUG) logging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: betvector-midday
  cancel-in-progress: false

jobs:
  midday:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run midday pipeline
        run: |
          python -c "
          from src.database.db import init_db
          init_db()
          from src.database.seed import seed_all
          seed_all()
          print('Setup complete')
          "
          VERBOSE_FLAG=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="--verbose"
          fi
          python run_pipeline.py midday $VERBOSE_FLAG

      - name: Commit database changes
        run: |
          git config user.name "BetVector Bot"
          git config user.email "bot@betvector.dev"
          git add data/betvector.db
          git diff --staged --quiet || git commit -m "Midday pipeline: $(date -u +%Y-%m-%d)"
          git push

      - name: Send failure notification
        if: failure()
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          pwd = os.environ.get('GMAIL_APP_PASSWORD', '')
          sender = os.environ.get('FROM_EMAIL', '')
          if not pwd or not sender:
              print('Missing GMAIL_APP_PASSWORD or FROM_EMAIL, skipping notification')
              exit(0)
          msg = MIMEText(
              'The BetVector midday pipeline failed.\n\n'
              'Check the workflow run at: '
              'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n'
          )
          msg['Subject'] = 'BetVector Midday Pipeline FAILED'
          msg['From'] = sender
          msg['To'] = sender
          try:
              with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
                  smtp.login(sender, pwd)
                  smtp.send_message(msg)
              print('Failure notification sent')
          except Exception as e:
              print(f'Failed to send notification: {e}')
          "
