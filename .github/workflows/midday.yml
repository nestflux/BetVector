# ============================================================================
# BetVector — Midday Pipeline (E13-01)
# ============================================================================
# Runs the midday odds-update pipeline daily at 13:00 UTC:
#   re-fetch odds → recalculate edges → update dashboard data
#
# Schedule: 13:00 UTC every day (cron: "0 13 * * *")
# Manual trigger: workflow_dispatch (run from GitHub Actions UI)
#
# Master Plan refs: MP §5 Architecture → Scheduling (GitHub Actions)
# ============================================================================

name: Midday Pipeline

on:
  schedule:
    # 13:00 UTC daily — afternoon in Europe, right before most matches
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      verbose:
        description: "Enable verbose (DEBUG) logging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: betvector-midday
  cancel-in-progress: false

jobs:
  midday:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run midday pipeline
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          VERBOSE_FLAG=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="--verbose"
          fi
          python run_pipeline.py midday $VERBOSE_FLAG

      - name: Commit database changes
        run: |
          git config user.name "BetVector Bot"
          git config user.email "bot@betvector.dev"
          git add data/betvector.db
          git diff --staged --quiet || git commit -m "Midday pipeline: $(date -u +%Y-%m-%d)"
          git push

      - name: Send failure notification
        if: failure()
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          pwd = os.environ.get('GMAIL_APP_PASSWORD', '')
          if not pwd:
              print('No GMAIL_APP_PASSWORD set, skipping failure notification')
              exit(0)
          msg = MIMEText(
              'The BetVector midday pipeline failed.\n\n'
              'Check the workflow run at: '
              'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n'
              'Timestamp: $(date -u +\"%Y-%m-%d %H:%M UTC\")'
          )
          msg['Subject'] = 'BetVector Midday Pipeline FAILED'
          msg['From'] = 'betvector.alerts@gmail.com'
          msg['To'] = 'betvector.alerts@gmail.com'
          try:
              with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
                  smtp.login('betvector.alerts@gmail.com', pwd)
                  smtp.send_message(msg)
              print('Failure notification sent')
          except Exception as e:
              print(f'Failed to send notification: {e}')
          "
