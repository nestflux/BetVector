# ============================================================================
# BetVector — Morning Pipeline (E13-01)
# ============================================================================
# Runs the full morning pipeline daily at 06:00 UTC:
#   scrape data → compute features → run predictions → detect value bets
#   → log system picks → send morning email
#
# Schedule: 06:00 UTC every day (cron: "0 6 * * *")
# Manual trigger: workflow_dispatch (run from GitHub Actions UI)
#
# Master Plan refs: MP §5 Architecture → Scheduling (GitHub Actions)
# ============================================================================

name: Morning Pipeline

on:
  schedule:
    # 06:00 UTC daily — matches roughly 7 AM BST / 8 AM CEST
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions UI
    inputs:
      verbose:
        description: "Enable verbose (DEBUG) logging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Only one pipeline run at a time (prevent overlapping runs)
concurrency:
  group: betvector-morning
  cancel-in-progress: false

jobs:
  morning:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
      FOOTBALL_DATA_ORG_KEY: ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}

    steps:
      # --- 1. Checkout the repo (including the SQLite database) ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 2. Set up Python 3.10 ---
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # --- 3. Install dependencies ---
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      # --- 4. Verify setup and run pipeline ---
      - name: Run morning pipeline
        run: |
          echo "=== Database check ==="
          ls -la data/betvector.db 2>/dev/null && echo "DB exists" || echo "DB missing"
          echo ""
          echo "=== Running setup + migration ==="
          python -c "
          import sqlite3
          from src.database.db import init_db, get_session
          from src.config import PROJECT_ROOT

          # Create tables if DB is brand new
          init_db()

          # Migrate: add columns that may be missing from older DB versions
          db_path = str(PROJECT_ROOT / 'data' / 'betvector.db')
          conn = sqlite3.connect(db_path)
          cols = [r[1] for r in conn.execute('PRAGMA table_info(users)').fetchall()]
          migrations = {
              'notify_morning': 'ALTER TABLE users ADD COLUMN notify_morning INTEGER DEFAULT 1',
              'notify_evening': 'ALTER TABLE users ADD COLUMN notify_evening INTEGER DEFAULT 1',
              'notify_weekly': 'ALTER TABLE users ADD COLUMN notify_weekly INTEGER DEFAULT 1',
              'has_onboarded': 'ALTER TABLE users ADD COLUMN has_onboarded INTEGER DEFAULT 0',
          }
          for col, sql in migrations.items():
              if col not in cols:
                  conn.execute(sql)
                  print(f'  Added missing column: {col}')

          # Teams table: add api_football_name column (real-time data sources)
          team_cols = [r[1] for r in conn.execute('PRAGMA table_info(teams)').fetchall()]
          if 'api_football_name' not in team_cols:
              conn.execute('ALTER TABLE teams ADD COLUMN api_football_name TEXT')
              print('  Added missing column: teams.api_football_name')

          # Weather table: create if not exists (Open-Meteo match-day conditions)
          conn.execute('''CREATE TABLE IF NOT EXISTS weather (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              match_id INTEGER NOT NULL UNIQUE REFERENCES matches(id),
              temperature_c REAL,
              wind_speed_kmh REAL,
              humidity_pct REAL,
              precipitation_mm REAL,
              weather_code INTEGER,
              weather_category TEXT,
              source TEXT NOT NULL DEFAULT 'open_meteo',
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
          )''')

          # Features table: add all feature columns (E16 through E22)
          feat_cols = [r[1] for r in conn.execute('PRAGMA table_info(features)').fetchall()]
          # REAL columns
          real_feature_cols = [
              # E16: NPxG, PPDA, deep, weather, market value
              'npxg_5', 'npxga_5', 'npxg_diff_5', 'ppda_5', 'ppda_allowed_5', 'deep_5', 'deep_allowed_5',
              'npxg_10', 'npxga_10', 'npxg_diff_10', 'ppda_10', 'ppda_allowed_10', 'deep_10', 'deep_allowed_10',
              'market_value_ratio', 'squad_value_log',
              'temperature_c', 'wind_speed_kmh', 'precipitation_mm',
              # E20: Pinnacle odds + AH line
              'pinnacle_home_prob', 'pinnacle_draw_prob', 'pinnacle_away_prob', 'pinnacle_overround', 'ah_line',
              # E21: Elo ratings + referee stats
              'elo_rating', 'elo_diff',
              'ref_avg_fouls', 'ref_avg_yellows', 'ref_avg_goals', 'ref_home_win_pct',
              # E22: Set-piece xG + injury impact
              'set_piece_xg_5', 'open_play_xg_5', 'injury_impact',
          ]
          # INTEGER columns
          int_feature_cols = [
              'is_heavy_weather',       # E16
              'days_since_last_match',   # E21
              'is_congested',            # E21
              'rest_days',               # E21
              'key_player_out',          # E22
          ]
          for col in real_feature_cols:
              if col not in feat_cols:
                  conn.execute(f'ALTER TABLE features ADD COLUMN {col} REAL')
                  print(f'  Added: features.{col}')
          for col in int_feature_cols:
              if col not in feat_cols:
                  conn.execute(f'ALTER TABLE features ADD COLUMN {col} INTEGER')
                  print(f'  Added: features.{col}')

          # Matches table: add referee column (E19-03)
          match_cols = [r[1] for r in conn.execute('PRAGMA table_info(matches)').fetchall()]
          if 'referee' not in match_cols:
              conn.execute('ALTER TABLE matches ADD COLUMN referee TEXT')
              print('  Added: matches.referee')

          # MatchStats table: add set-piece xG columns (E22-01)
          ms_cols = [r[1] for r in conn.execute('PRAGMA table_info(match_stats)').fetchall()]
          for col in ['set_piece_xg', 'open_play_xg']:
              if col not in ms_cols:
                  conn.execute(f'ALTER TABLE match_stats ADD COLUMN {col} REAL')
                  print(f'  Added: match_stats.{col}')

          # ClubElo table (E21-01)
          conn.execute('''CREATE TABLE IF NOT EXISTS club_elo (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              team_id INTEGER NOT NULL REFERENCES teams(id),
              elo_rating REAL NOT NULL,
              rank INTEGER,
              rating_date TEXT NOT NULL,
              created_at TEXT NOT NULL DEFAULT (datetime('now')),
              UNIQUE (team_id, rating_date)
          )''')

          # InjuryFlags table (E22-02)
          conn.execute('''CREATE TABLE IF NOT EXISTS injury_flags (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              team_id INTEGER NOT NULL REFERENCES teams(id),
              player_name TEXT NOT NULL,
              status TEXT NOT NULL CHECK (status IN ('out', 'doubt', 'suspended')),
              estimated_return TEXT,
              impact_rating REAL NOT NULL CHECK (impact_rating >= 0.0 AND impact_rating <= 1.0),
              created_at TEXT NOT NULL DEFAULT (datetime('now')),
              updated_at TEXT NOT NULL DEFAULT (datetime('now'))
          )''')

          # Fix odds CHECK constraint if 'home_line' is missing (E19-03)
          odds_sql = conn.execute("SELECT sql FROM sqlite_master WHERE type='table' AND name='odds'").fetchone()
          if odds_sql and 'home_line' not in odds_sql[0]:
              print('  Migrating odds CHECK constraint to include home_line...')
              conn.execute('''CREATE TABLE odds_new (
                  id INTEGER NOT NULL PRIMARY KEY,
                  match_id INTEGER NOT NULL,
                  bookmaker VARCHAR NOT NULL,
                  market_type VARCHAR NOT NULL,
                  selection VARCHAR NOT NULL,
                  odds_decimal FLOAT NOT NULL,
                  implied_prob FLOAT NOT NULL,
                  is_opening INTEGER DEFAULT '0' NOT NULL,
                  captured_at VARCHAR DEFAULT (datetime('now')) NOT NULL,
                  source VARCHAR DEFAULT 'football_data' NOT NULL,
                  CONSTRAINT ck_odds_market_type CHECK (market_type IN ('1X2', 'OU25', 'OU15', 'OU35', 'BTTS', 'AH')),
                  CONSTRAINT ck_odds_selection CHECK (selection IN ('home', 'draw', 'away', 'over', 'under', 'yes', 'no', 'home_line', 'home_-0.5', 'home_-1.0', 'home_-1.5', 'home_+0.5', 'home_+1.0', 'home_+1.5', 'away_-0.5', 'away_-1.0', 'away_-1.5', 'away_+0.5', 'away_+1.0', 'away_+1.5')),
                  CONSTRAINT uq_odds_match_bookie_market_sel_time UNIQUE (match_id, bookmaker, market_type, selection, captured_at),
                  FOREIGN KEY(match_id) REFERENCES matches (id)
              )''')
              conn.execute('INSERT INTO odds_new SELECT * FROM odds')
              conn.execute('DROP TABLE odds')
              conn.execute('ALTER TABLE odds_new RENAME TO odds')
              conn.execute('CREATE INDEX IF NOT EXISTS idx_odds_match ON odds (match_id)')
              print('  Odds CHECK constraint migrated successfully')

          conn.commit()
          conn.close()

          from src.database.seed import seed_all
          seed_all()
          print('Setup complete')
          "
          echo ""
          echo "=== Running morning pipeline ==="
          VERBOSE_FLAG=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="--verbose"
          fi
          python run_pipeline.py morning $VERBOSE_FLAG

      # --- 5. Commit database changes back to repo ---
      # Handles binary DB conflicts automatically: if another pipeline or
      # local push updated the DB since checkout, we keep OUR version
      # (the one that just ran the pipeline with fresh data).
      - name: Commit database changes
        run: |
          git config user.name "BetVector Bot"
          git config user.email "bot@betvector.dev"
          git add data/betvector.db
          git add data/backups/*.db 2>/dev/null || true
          git diff --staged --quiet && echo "No DB changes to commit" && exit 0
          git commit -m "Morning pipeline: $(date -u +%Y-%m-%d)"
          # Pull remote changes before pushing; on binary DB conflict, keep ours
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "Push succeeded"
              break
            fi
            echo "Push failed (attempt $i/$MAX_RETRIES), pulling with conflict resolution..."
            git pull --rebase --strategy-option=ours origin main || {
              # If rebase conflicts on binary file, resolve and continue
              git checkout --ours data/betvector.db
              git add data/betvector.db
              git rebase --continue || true
            }
          done

      # --- 6. Notify on failure ---
      - name: Send failure notification
        if: failure()
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          pwd = os.environ.get('GMAIL_APP_PASSWORD', '')
          sender = os.environ.get('FROM_EMAIL', '')
          if not pwd or not sender:
              print('Missing GMAIL_APP_PASSWORD or FROM_EMAIL, skipping notification')
              exit(0)
          msg = MIMEText(
              'The BetVector morning pipeline failed.\n\n'
              'Check the workflow run at: '
              'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n'
          )
          msg['Subject'] = 'BetVector Morning Pipeline FAILED'
          msg['From'] = sender
          msg['To'] = sender
          try:
              with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
                  smtp.login(sender, pwd)
                  smtp.send_message(msg)
              print('Failure notification sent')
          except Exception as e:
              print(f'Failed to send notification: {e}')
          "
