# ============================================================================
# BetVector — Morning Pipeline (E33-04)
# ============================================================================
# Full daily pipeline: scrape → features → predict → value bets → email
#
# Schedule: DISABLED — Neon PostgreSQL quota exceeded (PC-13).
#           Pipeline now runs locally via macOS launchd (PC-15-04).
#           Manual trigger retained for future cloud DB migration.
#
# Database: Neon PostgreSQL via DATABASE_URL secret (currently over quota)
# Master Plan refs: MP §5 Architecture → Scheduling (GitHub Actions)
# ============================================================================

name: Morning Pipeline

on:
  # schedule disabled — Neon PostgreSQL quota exceeded (PC-13).
  # Pipeline now runs locally via macOS launchd (PC-15-04).
  # schedule:
  #   - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      verbose:
        description: "Enable verbose (DEBUG) logging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: betvector-morning
  cancel-in-progress: false

jobs:
  morning:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
      FOOTBALL_DATA_ORG_KEY: ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install -e .

      - name: Run morning pipeline
        run: |
          python -c "from src.database.db import init_db; from src.database.seed import seed_all; init_db(); seed_all(); print('Setup complete')"
          VERBOSE_FLAG=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="--verbose"
          fi
          python run_pipeline.py morning $VERBOSE_FLAG

      - name: Send failure notification
        if: failure()
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          pwd = os.environ.get('GMAIL_APP_PASSWORD', '')
          sender = os.environ.get('FROM_EMAIL', '')
          if not pwd or not sender:
              print('Missing GMAIL_APP_PASSWORD or FROM_EMAIL, skipping notification')
              exit(0)
          msg = MIMEText(
              'The BetVector morning pipeline failed.\n\n'
              'Check the workflow run at: '
              'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n'
          )
          msg['Subject'] = 'BetVector Morning Pipeline FAILED'
          msg['From'] = sender
          msg['To'] = sender
          try:
              with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
                  smtp.login(sender, pwd)
                  smtp.send_message(msg)
              print('Failure notification sent')
          except Exception as e:
              print(f'Failed to send notification: {e}')
          "
