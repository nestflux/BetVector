# ============================================================================
# BetVector — Evening Pipeline (E13-01)
# ============================================================================
name: Evening Pipeline

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      verbose:
        description: "Enable verbose (DEBUG) logging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: betvector-evening
  cancel-in-progress: false

jobs:
  evening:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run evening pipeline
        run: |
          python -c "
          import sqlite3
          from src.database.db import init_db
          from src.config import PROJECT_ROOT
          init_db()
          db_path = str(PROJECT_ROOT / 'data' / 'betvector.db')
          conn = sqlite3.connect(db_path)
          cols = [r[1] for r in conn.execute('PRAGMA table_info(users)').fetchall()]
          for col, sql in {'notify_morning': 'ALTER TABLE users ADD COLUMN notify_morning INTEGER DEFAULT 1', 'notify_evening': 'ALTER TABLE users ADD COLUMN notify_evening INTEGER DEFAULT 1', 'notify_weekly': 'ALTER TABLE users ADD COLUMN notify_weekly INTEGER DEFAULT 1', 'has_onboarded': 'ALTER TABLE users ADD COLUMN has_onboarded INTEGER DEFAULT 0'}.items():
              if col not in cols:
                  conn.execute(sql)
                  print(f'  Added missing column: {col}')
          conn.commit()
          conn.close()
          from src.database.seed import seed_all
          seed_all()
          print('Setup complete')
          "
          VERBOSE_FLAG=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="--verbose"
          fi
          python run_pipeline.py evening $VERBOSE_FLAG

      - name: Weekly database backup (Sundays)
        run: |
          DAY_OF_WEEK=$(date -u +%u)
          if [ "$DAY_OF_WEEK" = "7" ]; then
            echo "Sunday — running weekly backup"
            bash scripts/backup_db.sh
          else
            echo "Not Sunday (day=$DAY_OF_WEEK), skipping backup"
          fi

      - name: Commit database changes
        run: |
          git config user.name "BetVector Bot"
          git config user.email "bot@betvector.dev"
          git add data/betvector.db
          git add data/backups/*.db 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Evening pipeline: $(date -u +%Y-%m-%d)"
          git push

      - name: Send failure notification
        if: failure()
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          pwd = os.environ.get('GMAIL_APP_PASSWORD', '')
          sender = os.environ.get('FROM_EMAIL', '')
          if not pwd or not sender:
              print('Missing GMAIL_APP_PASSWORD or FROM_EMAIL, skipping notification')
              exit(0)
          msg = MIMEText(
              'The BetVector evening pipeline failed.\n\n'
              'Check the workflow run at: '
              'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n'
          )
          msg['Subject'] = 'BetVector Evening Pipeline FAILED'
          msg['From'] = sender
          msg['To'] = sender
          try:
              with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
                  smtp.login(sender, pwd)
                  smtp.send_message(msg)
              print('Failure notification sent')
          except Exception as e:
              print(f'Failed to send notification: {e}')
          "
