# ============================================================================
# BetVector — Evening Pipeline (E13-01)
# ============================================================================
# Runs the evening results pipeline daily at 22:00 UTC:
#   scrape results → resolve bets → update P&L → compute metrics
#   → recalibration check → retrain trigger check → send evening email
#   → weekly summary on Sundays
#
# Schedule: 22:00 UTC every day (cron: "0 22 * * *")
# Manual trigger: workflow_dispatch (run from GitHub Actions UI)
#
# Master Plan refs: MP §5 Architecture → Scheduling (GitHub Actions)
# ============================================================================

name: Evening Pipeline

on:
  schedule:
    # 22:00 UTC daily — after most European matches have finished
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      verbose:
        description: "Enable verbose (DEBUG) logging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: betvector-evening
  cancel-in-progress: false

jobs:
  evening:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run evening pipeline
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          VERBOSE_FLAG=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="--verbose"
          fi
          python run_pipeline.py evening $VERBOSE_FLAG

      # --- Weekly backup (Sundays only) ---
      # After the evening pipeline completes, create a timestamped backup
      # of the database.  Keeps the last 10 backups, removes older ones.
      - name: Weekly database backup (Sundays)
        if: github.event.schedule == '0 22 * * *' && contains('0', '') || true
        run: |
          DAY_OF_WEEK=$(date -u +%u)
          if [ "$DAY_OF_WEEK" = "7" ]; then
            echo "Sunday — running weekly backup"
            bash scripts/backup_db.sh
          else
            echo "Not Sunday (day=$DAY_OF_WEEK), skipping backup"
          fi

      - name: Commit database changes
        run: |
          git config user.name "BetVector Bot"
          git config user.email "bot@betvector.dev"
          git add data/betvector.db
          git add data/backups/*.db 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Evening pipeline: $(date -u +%Y-%m-%d)"
          git push

      - name: Send failure notification
        if: failure()
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import os, smtplib
          from email.mime.text import MIMEText
          pwd = os.environ.get('GMAIL_APP_PASSWORD', '')
          if not pwd:
              print('No GMAIL_APP_PASSWORD set, skipping failure notification')
              exit(0)
          msg = MIMEText(
              'The BetVector evening pipeline failed.\n\n'
              'Check the workflow run at: '
              'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n'
              'Timestamp: $(date -u +\"%Y-%m-%d %H:%M UTC\")'
          )
          msg['Subject'] = 'BetVector Evening Pipeline FAILED'
          msg['From'] = 'betvector.alerts@gmail.com'
          msg['To'] = 'betvector.alerts@gmail.com'
          try:
              with smtplib.SMTP_SSL('smtp.gmail.com', 465) as smtp:
                  smtp.login('betvector.alerts@gmail.com', pwd)
                  smtp.send_message(msg)
              print('Failure notification sent')
          except Exception as e:
              print(f'Failed to send notification: {e}')
          "
