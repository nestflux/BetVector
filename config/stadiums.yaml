# ============================================================================
# BetVector — Stadium Coordinates for Weather Data
# ============================================================================
# Latitude/longitude for each EPL team's home stadium.  Used by the Weather
# scraper to fetch match-day conditions from Open-Meteo.  Coordinates are
# approximate centre-of-pitch — accuracy within 100m is sufficient since
# Open-Meteo interpolates from a ~1km grid.
#
# Update this file each summer when teams are promoted/relegated.
# 2025-26 promoted: Sunderland, Leeds United, Burnley
# 2025-26 relegated: Leicester City, Ipswich Town, Southampton
# ============================================================================

