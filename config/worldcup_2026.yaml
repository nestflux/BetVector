elo:
  default_rating: 1500.0
  regression_factor: 0.20
  regression_cutoff_date: "2022-12-19"
  min_year: 2018
  k_factors:
    friendly: 20
    qualifier: 25
    confederation_tournament: 35
    wc_group: 40
    wc_knockout: 50
  home_advantage:
    true_home: 100
    partial_home: 50
    neutral: 0

odds_api_name_map:
  "Bosnia & Herzegovina": "Bosnia and Herzegovina"
  "Türkiye": "Turkey"
  "Czechia": "Czech Republic"
  "United States": "USA"
  "Congo DR": "DR Congo"
  "Côte d'Ivoire": "Ivory Coast"
  "Korea Republic": "South Korea"

betting:
  edge_threshold: 0.03
  kelly_fraction: 0.25
  max_edge_display: 0.30
  # Edge ceiling (WC calibration 2026-06-23): against a sharp 59-book WC market,
  # edges above this reflect model error (measured under +3.9pp / home +3.7pp
  # biases on sparse international data), not value — excluded from actionable bets.
  max_actionable_edge: 0.15
  # Spreads deferred — Poisson model doesn't produce spread-adjusted probs
  markets:
    - h2h
    - totals

# Hierarchical Bayesian Poisson (WC-09-05) — scipy MAP + Laplace. Shadow only.
bayesian:
  # SD of the Gaussian shrinkage prior on team attack/defence (log-rate units).
  # This is the hierarchical pooling strength: smaller = more pooling toward the
  # global mean (more shrinkage for sparse teams). 0.35 → teams span ~exp(±0.7).
  prior_sd: 0.35
  # Match weight halves every N days (recent international form matters more).
  # 1825 = 5 years; combined multiplicatively with each match's importance weight.
  recency_halflife_days: 1825
  # Dixon-Coles low-score correction applied to the 7×7 matrix (same as Poisson).
  rho: -0.05
