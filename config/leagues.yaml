# ============================================================================
# BetVector — League Configuration
# ============================================================================
# Defines which leagues are tracked, their data-source identifiers, and
# which seasons to ingest.  Add new leagues by copying the EPL block and
# changing the values.  Set is_active: false to disable a league without
# removing it.
# ============================================================================

leagues:
  - name: "English Premier League"
    short_name: "EPL"
    country: "England"
    # Football-Data.co.uk uses two-letter codes for CSV file names
    football_data_code: "E0"
    # soccerdata / FBref league identifier (used by the soccerdata package)
    fbref_league_id: "ENG-Premier League"
    # RapidAPI / API-Football numeric league ID
    api_football_id: 39
    # Understat league identifier (used by understatapi package)
    understat_league: "EPL"
    # Football-Data.org API competition code (free tier: PL=Premier League only)
    # Set to null for leagues not covered by Football-Data.org free tier.
    football_data_org_code: "PL"
    is_active: true
    seasons:
      - "2020-21"
      - "2021-22"
      - "2022-23"
      - "2023-24"
      - "2024-25"
      - "2025-26"
    total_matchdays: 38

  # -------------------------------------------------------------------------
  # English Championship (E36-01 — League Expansion)
  # Football-Data.co.uk code: E1 (same CSV format as EPL's E0 — zero code changes)
  # 24 teams × 46 matches per team = 552 matches per season
  # Less efficient market than EPL → edge_threshold_override: 0.03 (3%)
  # NOTE: Championship is NOT covered by Understat — understat_league: null
  # so the xG step is skipped gracefully, model falls back to goals-only features
  # -------------------------------------------------------------------------
  - name: "Championship"
    short_name: "Championship"
    country: "England"
    football_data_code: "E1"
    fbref_league_id: null
    api_football_id: 40
    understat_league: null   # Understat covers EPL, La Liga, Bundesliga, Serie A, Ligue 1 only
    football_data_org_code: null  # Football-Data.org free tier covers PL only; Championship skipped
    is_active: true
    seasons:
      - "2020-21"
      - "2021-22"
      - "2022-23"
      - "2023-24"
      - "2024-25"
      - "2025-26"
    total_matchdays: 46
    edge_threshold_override: 0.03  # Lower threshold — Championship market less efficient than EPL

  # -------------------------------------------------------------------------
  # La Liga (E36-02 — League Expansion)
  # Football-Data.co.uk code: SP1 (same CSV format as EPL E0)
  # 20 teams × 38 matches per team = 380 matches per season
  # Well-served market (Pinnacle, Betway cover it well) → EPL-level 5% threshold
  # Understat key: "La_Liga" (underscore + uppercase L — NOT "La liga")
  # ClubElo covers La Liga teams fully
  # Football-Data.org free tier covers PL only → football_data_org_code: null
  # -------------------------------------------------------------------------
  - name: "La Liga"
    short_name: "LaLiga"
    country: "Spain"
    football_data_code: "SP1"
    fbref_league_id: "ESP-La Liga"
    api_football_id: 140
    understat_league: "La_Liga"   # Understat API key (verified: returns 380 matches/season)
    football_data_org_code: null  # Football-Data.org free tier covers PL only
    is_active: true
    seasons:
      - "2020-21"
      - "2021-22"
      - "2022-23"
      - "2023-24"
      - "2024-25"
      - "2025-26"
    total_matchdays: 38
    edge_threshold_override: 0.05  # Same as EPL — well-served market

  # -------------------------------------------------------------------------
  # French Ligue 1 (PC-08-02 — replaces English League One)
  # Football-Data.co.uk code: F1 (same CSV format as other leagues)
  # 20 teams × 38 matchdays = 380 matches per season (2020-21, 2021-22, 2022-23)
  # 18 teams × 34 matchdays = 306 matches per season (2023-24 onwards — Ligue 1
  #   reduced to 18 teams starting 2023-24)
  # Well-served market (Pinnacle covers it well) → edge_threshold_override: 0.05
  # Understat key: "Ligue_1" — full xG/NPxG/PPDA/deep coverage
  # ClubElo covers all Ligue 1 teams fully (Level 1 French football)
  # Football-Data.org free tier covers PL only → football_data_org_code: null
  # -------------------------------------------------------------------------
  - name: "Ligue 1"
    short_name: "Ligue1"
    country: "France"
    football_data_code: "F1"
    fbref_league_id: "FRA-Ligue-1"
    api_football_id: 61
    understat_league: "Ligue_1"  # Full Understat coverage (xG, NPxG, PPDA, deep)
    football_data_org_code: null # Football-Data.org free tier covers PL only
    is_active: true
    seasons:
      - "2020-21"
      - "2021-22"
      - "2022-23"
      - "2023-24"
      - "2024-25"
      - "2025-26"
    total_matchdays: 38
    edge_threshold_override: 0.05  # Same as EPL — well-served market

  # -------------------------------------------------------------------------
  # Bundesliga (E38-03 — League Expansion Phase 2)
  # Football-Data.co.uk code: D1 (same CSV format as other leagues)
  # 18 teams × 34 matchdays = 306 matches per season
  # Well-served market (Pinnacle covers it well) → edge_threshold_override: 0.05 (5%)
  # Understat key: "Bundesliga" — full coverage of all seasons
  # ClubElo covers all Bundesliga teams fully
  # Football-Data.org free tier covers PL only → football_data_org_code: null
  # -------------------------------------------------------------------------
  - name: "Bundesliga"
    short_name: "Bundesliga"
    country: "Germany"
    football_data_code: "D1"
    fbref_league_id: "GER-Bundesliga"
    api_football_id: 78
    understat_league: "Bundesliga"  # Full Understat coverage (xG, NPxG, PPDA, deep)
    football_data_org_code: null    # Football-Data.org free tier covers PL only
    is_active: true
    seasons:
      - "2020-21"
      - "2021-22"
      - "2022-23"
      - "2023-24"
      - "2024-25"
      - "2025-26"
    total_matchdays: 34
    edge_threshold_override: 0.05  # Same as EPL — well-served market

  # -------------------------------------------------------------------------
  # Serie A (E38-04 — League Expansion Phase 2)
  # Football-Data.co.uk code: I1 (same CSV format as other leagues)
  # 20 teams × 38 matchdays = 380 matches per season
  # Well-served market (Pinnacle covers it well) → edge_threshold_override: 0.05 (5%)
  # Understat key: "Serie_A" — full coverage of all seasons (xG, NPxG, PPDA, deep)
  # ClubElo covers all Serie A teams fully (Level 1 + relegated Level 2)
  # Football-Data.org free tier covers PL only → football_data_org_code: null
  # -------------------------------------------------------------------------
  - name: "Serie A"
    short_name: "SerieA"
    country: "Italy"
    football_data_code: "I1"
    fbref_league_id: "ITA-Serie A"
    api_football_id: 135
    understat_league: "Serie_A"    # Full Understat coverage (xG, NPxG, PPDA, deep)
    football_data_org_code: null   # Football-Data.org free tier covers PL only
    is_active: true
    seasons:
      - "2020-21"
      - "2021-22"
      - "2022-23"
      - "2023-24"
      - "2024-25"
      - "2025-26"
    total_matchdays: 38
    edge_threshold_override: 0.05  # Same as EPL — well-served market
