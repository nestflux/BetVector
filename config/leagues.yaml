# ============================================================================
# BetVector — League Configuration
# ============================================================================
# Defines which leagues are tracked, their data-source identifiers, and
# which seasons to ingest.  Add new leagues by copying the EPL block and
# changing the values.  Set is_active: false to disable a league without
# removing it.
# ============================================================================

leagues:
  - name: "English Premier League"
    short_name: "EPL"
    country: "England"
    # Football-Data.co.uk uses two-letter codes for CSV file names
    football_data_code: "E0"
    # soccerdata / FBref league identifier (used by the soccerdata package)
    fbref_league_id: "ENG-Premier League"
    # RapidAPI / API-Football numeric league ID
    api_football_id: 39
    # Understat league identifier (used by understatapi package)
    understat_league: "EPL"
    # Football-Data.org API competition code (free tier: PL=Premier League only)
    # Set to null for leagues not covered by Football-Data.org free tier.
    football_data_org_code: "PL"
    # Transfermarkt Datasets CDN competition ID (dcaribou/transfermarkt-datasets)
    transfermarkt_id: "GB1"
    # Soccerdata API league ID (soccerdataapi.com — E39-02)
    soccerdata_league_id: 228
    is_active: true
    seasons:
      - "2017-18"
      - "2018-19"
      - "2019-20"
      - "2020-21"
      - "2021-22"
      - "2022-23"
      - "2023-24"
      - "2024-25"
      - "2025-26"
    total_matchdays: 38
    # PC-25-01: Per-league strategy profile.  Pipeline reads these values
    # with global defaults as fallback (see settings.yaml value_betting).
    # EPL is the most efficient market — no sharp filtering, standard stake.
    strategy:
      sharp_only: false        # All bookmakers (efficient market, Pinnacle hurts by -12pp)
      stake_multiplier: 1.0    # 🟡 promising tier — standard stake
      max_daily_bets: 10       # Per-league daily cap
      auto_bet: false          # 🟡 tier — analysis only until CI confirms edge
      clv_tracking: true       # Track closing line value for edge validation
      shadow_mode: false       # PC-25-12: shadow mode off by default (manual opt-in)
      staking_method: flat     # PC-25-15: flat staking (🟡 tier)
    # PC-25-13: Per-league model parameters for Poisson prediction
    model_params:
      lambda_min: 0.2          # Floor for expected goals (prevents near-zero probs)
      lambda_max: 3.5          # Ceiling for expected goals (EPL avg ~2.7 goals/match)
      training_weight: 1.0     # Same-league training data weight (1.0 = no boost)

  # -------------------------------------------------------------------------
  # English Championship (E36-01 — League Expansion)
  # Football-Data.co.uk code: E1 (same CSV format as EPL's E0 — zero code changes)
  # 24 teams × 46 matches per team = 552 matches per season
  # Less efficient market than EPL → edge_threshold_override: 0.10 (10%, PC-24-01)
  # NOTE: Championship is NOT covered by Understat — understat_league: null
  # so the xG step is skipped gracefully, model falls back to goals-only features
  # -------------------------------------------------------------------------
  - name: "Championship"
    short_name: "Championship"
    country: "England"
    football_data_code: "E1"
    fbref_league_id: null
    api_football_id: 40
    understat_league: null   # Understat covers EPL, La Liga, Bundesliga, Serie A, Ligue 1 only
    football_data_org_code: "ELC"  # Football-Data.org free tier — verified covers Championship
    transfermarkt_id: "GB2"
    # Soccerdata API league ID (soccerdataapi.com — E39-02)
    soccerdata_league_id: 229
    is_active: true
    seasons:
      - "2017-18"
      - "2018-19"
      - "2019-20"
      - "2020-21"
      - "2021-22"
      - "2022-23"
      - "2023-24"
      - "2024-25"
      - "2025-26"
    total_matchdays: 46
    edge_threshold_override: 0.10  # PC-24-01: Best ROI at 10% (+10.5%, 731 VBs) — sweep-validated
    # PC-25-01: Championship is our only 🟢 profitable league (CI [3.5%, 23.0%]).
    # Less efficient market (13% of EPL volume) → edges persist 1-3 seasons.
    # No sharp filtering needed — market inefficiency is structural.
    strategy:
      sharp_only: false        # All bookmakers (market is inefficient enough without filtering)
      stake_multiplier: 1.5    # 🟢 profitable tier — lean into verified edge (PC-25-09)
      max_daily_bets: 10       # Per-league daily cap
      auto_bet: true           # 🟢 tier — system recommends betting
      clv_tracking: true       # Track CLV to confirm edge persistence
      shadow_mode: true        # PC-26-11: Shadow tests FLAT staking vs live Kelly.
      #   Live bets use Kelly (below). Shadow bets paper-trade flat staking.
      #   After 4 weeks, generate_shadow_comparison() evaluates if Kelly
      #   actually outperforms flat. If not, revert to flat.
      # PC-25-15: Quarter-Kelly for the only 🟢 profitable league.
      # Max 3% per bet (not 5%) and auto-rollback if drawdown exceeds 15%.
      staking_method: kelly    # Kelly staking (verified profitable, CI [3.5%, 23.0%])
      kelly_max_bet_pct: 0.03  # Max 3% per bet under Kelly (stricter than global 5%)
      drawdown_rollback_pct: 0.15  # Auto-revert to flat if drawdown > 15%
    # PC-25-13: Per-league model parameters for Poisson prediction
    model_params:
      lambda_min: 0.2          # Floor for expected goals
      lambda_max: 3.5          # Ceiling — Championship has lower xG than top tier
      training_weight: 2.0     # 2× weight for same-league data (market inefficiency)

  # -------------------------------------------------------------------------
  # La Liga (E36-02 — League Expansion)
  # Football-Data.co.uk code: SP1 (same CSV format as EPL E0)
  # 20 teams × 38 matches per team = 380 matches per season
  # Well-served market (Pinnacle, Betway cover it well) → EPL-level 5% threshold
  # Understat key: "La_Liga" (underscore + uppercase L — NOT "La liga")
  # ClubElo covers La Liga teams fully
  # Football-Data.org free tier covers La Liga via competition code "PD"
  # -------------------------------------------------------------------------
  - name: "La Liga"
    short_name: "LaLiga"
    country: "Spain"
    football_data_code: "SP1"
    fbref_league_id: "ESP-La Liga"
    api_football_id: 140
    understat_league: "La_Liga"   # Understat API key (verified: returns 380 matches/season)
    football_data_org_code: "PD"  # Football-Data.org free tier — verified covers La Liga
    transfermarkt_id: "ES1"
    # Soccerdata API league ID (soccerdataapi.com — E39-02)
    soccerdata_league_id: 297
    is_active: true
    seasons:
      - "2017-18"
      - "2018-19"
      - "2019-20"
      - "2020-21"
      - "2021-22"
      - "2022-23"
      - "2023-24"
      - "2024-25"
      - "2025-26"
    total_matchdays: 38
    edge_threshold_override: 0.08  # PC-24-01: Best ROI at 8% (+18.1%, 110 VBs) — sweep-validated
    # PC-25-01: LaLiga shows +21.49pp ROI with Pinnacle-only filtering (PC-24-02
    # backtest). Sharp filtering works here because Pinnacle has excellent La Liga
    # coverage and the model consistently beats Pinnacle's line on this league.
    strategy:
      sharp_only: true         # Pinnacle-only — +21.49pp improvement in backtest
      stake_multiplier: 1.0    # 🟡 promising tier — standard stake
      max_daily_bets: 8        # Per-league daily cap
      auto_bet: false          # 🟡 tier — analysis only (CI [-9.2%, +50.3%] crosses zero)
      clv_tracking: true       # Critical — LaLiga CLV validates the sharp-only edge
      shadow_mode: true        # PC-26-12: Shadow tests ALL-BOOKMAKERS edge vs live Pinnacle-only.
      #   Live bets use sharp_only: true (Pinnacle). Shadow bets compute edge
      #   against all bookmakers to validate the +21pp sharp-only advantage.
      staking_method: flat     # PC-25-15: flat staking (🟡 tier)
    # PC-25-13: Per-league model parameters for Poisson prediction
    model_params:
      lambda_min: 0.2          # Floor for expected goals
      lambda_max: 3.5          # Ceiling — La Liga avg ~2.5 goals/match
      training_weight: 1.5     # 1.5× weight (sharp-only filtering creates smaller sample)

  # -------------------------------------------------------------------------
  # French Ligue 1 (PC-08-02 — replaces English League One)
  # Football-Data.co.uk code: F1 (same CSV format as other leagues)
  # 20 teams × 38 matchdays = 380 matches per season (2020-21, 2021-22, 2022-23)
  # 18 teams × 34 matchdays = 306 matches per season (2023-24 onwards — Ligue 1
  #   reduced to 18 teams starting 2023-24)
  # Well-served market (Pinnacle covers it well) → edge_threshold_override: 0.05
  # Understat key: "Ligue_1" — full xG/NPxG/PPDA/deep coverage
  # ClubElo covers all Ligue 1 teams fully (Level 1 French football)
  # Football-Data.org free tier covers Ligue 1 via competition code "FL1"
  # -------------------------------------------------------------------------
  - name: "Ligue 1"
    short_name: "Ligue1"
    country: "France"
    football_data_code: "F1"
    fbref_league_id: "FRA-Ligue-1"
    api_football_id: 61
    understat_league: "Ligue_1"  # Full Understat coverage (xG, NPxG, PPDA, deep)
    football_data_org_code: "FL1" # Football-Data.org free tier — verified covers Ligue 1
    transfermarkt_id: "FR1"
    # Soccerdata API league ID (soccerdataapi.com — E39-02)
    soccerdata_league_id: 235
    is_active: true
    seasons:
      - "2017-18"
      - "2018-19"
      - "2019-20"
      - "2020-21"
      - "2021-22"
      - "2022-23"
      - "2023-24"
      - "2024-25"
      - "2025-26"
    total_matchdays: 38
    edge_threshold_override: 0.07  # PC-24-01: 7% is -21.8% vs 8% at -32.1% — minimises losses
    # PC-25-01: Ligue1 shows +22.14pp ROI with Pinnacle-only filtering (PC-24-02
    # backtest). Turned a 🔴 unprofitable league into ~break-even. Pinnacle has
    # strong Ligue 1 coverage and the model finds genuine edge against sharp odds.
    strategy:
      sharp_only: true         # Pinnacle-only — +22.14pp improvement in backtest
      stake_multiplier: 0.5    # 🔴 tier — reduce exposure, keep learning (PC-25-09)
      max_daily_bets: 8        # Per-league daily cap
      auto_bet: false          # 🔴 tier — analysis only
      clv_tracking: true       # Track whether Pinnacle-only edge persists
      shadow_mode: false       # PC-25-12: shadow mode off by default
      staking_method: flat     # PC-25-15: flat staking (🔴 tier)
    # PC-25-13: Per-league model parameters for Poisson prediction
    model_params:
      lambda_min: 0.2          # Floor for expected goals
      lambda_max: 3.5          # Ceiling — Ligue 1 avg ~2.5 goals/match
      training_weight: 1.0     # Standard weight

  # -------------------------------------------------------------------------
  # Bundesliga (E38-03 — League Expansion Phase 2)
  # Football-Data.co.uk code: D1 (same CSV format as other leagues)
  # 18 teams × 34 matchdays = 306 matches per season
  # Well-served market (Pinnacle covers it well) → edge_threshold_override: 0.05 (5%)
  # Understat key: "Bundesliga" — full coverage of all seasons
  # ClubElo covers all Bundesliga teams fully
  # Football-Data.org free tier covers Bundesliga via competition code "BL1"
  # -------------------------------------------------------------------------
  - name: "Bundesliga"
    short_name: "Bundesliga"
    country: "Germany"
    football_data_code: "D1"
    fbref_league_id: "GER-Bundesliga"
    api_football_id: 78
    understat_league: "Bundesliga"  # Full Understat coverage (xG, NPxG, PPDA, deep)
    football_data_org_code: "BL1"   # Football-Data.org free tier — verified covers Bundesliga
    transfermarkt_id: "L1"
    # Soccerdata API league ID (soccerdataapi.com — E39-02)
    soccerdata_league_id: 241
    is_active: true
    seasons:
      - "2017-18"
      - "2018-19"
      - "2019-20"
      - "2020-21"
      - "2021-22"
      - "2022-23"
      - "2023-24"
      - "2024-25"
      - "2025-26"
    total_matchdays: 34
    edge_threshold_override: 0.05  # Same as EPL — well-served market
    # PC-26-09: Bundesliga upgraded 🔴→🟡 (Poisson ROI +9.6% on 205 bets,
    # CI [-4.1%, +23.3%]).  With expanded 2017-20 data, Bundesliga shows
    # promising but unproven edge.  XGBoost Brier 0.5887 also competitive.
    strategy:
      sharp_only: false        # All bookmakers — no evidence sharp filtering helps
      stake_multiplier: 1.0    # 🟡 tier — standard stake (upgraded from 0.5×, PC-26-09)
      max_daily_bets: 8        # Per-league daily cap
      auto_bet: false          # 🟡 tier — analysis only until proven
      clv_tracking: true       # Track CLV to detect if edge emerges
      shadow_mode: false       # PC-25-12: shadow mode off by default
      staking_method: flat     # PC-25-15: flat staking (🟡 tier — not proven enough for Kelly)
    # PC-25-13: Per-league model parameters for Poisson prediction
    # Bundesliga is the highest-scoring top league (avg ~3.0 goals/match)
    model_params:
      lambda_min: 0.3          # Slightly higher floor (Bundesliga is more attacking)
      lambda_max: 4.0          # Higher ceiling (Bundesliga avg ~3.0 goals/match)
      training_weight: 1.0     # Standard weight

  # -------------------------------------------------------------------------
  # Serie A (E38-04 — League Expansion Phase 2)
  # Football-Data.co.uk code: I1 (same CSV format as other leagues)
  # 20 teams × 38 matchdays = 380 matches per season
  # Well-served market (Pinnacle covers it well) → edge_threshold_override: 0.05 (5%)
  # Understat key: "Serie_A" — full coverage of all seasons (xG, NPxG, PPDA, deep)
  # ClubElo covers all Serie A teams fully (Level 1 + relegated Level 2)
  # Football-Data.org free tier covers Serie A via competition code "SA"
  # -------------------------------------------------------------------------
  - name: "Serie A"
    short_name: "SerieA"
    country: "Italy"
    football_data_code: "I1"
    fbref_league_id: "ITA-Serie A"
    api_football_id: 135
    understat_league: "Serie_A"    # Full Understat coverage (xG, NPxG, PPDA, deep)
    football_data_org_code: "SA"   # Football-Data.org free tier — verified covers Serie A
    transfermarkt_id: "IT1"
    # Soccerdata API league ID (soccerdataapi.com — E39-02)
    soccerdata_league_id: 253
    is_active: true
    seasons:
      - "2017-18"
      - "2018-19"
      - "2019-20"
      - "2020-21"
      - "2021-22"
      - "2022-23"
      - "2023-24"
      - "2024-25"
      - "2025-26"
    total_matchdays: 38
    edge_threshold_override: 0.05  # Same as EPL — well-served market
    # PC-25-01: SerieA is 🔴 unprofitable (CI [-32.4%, -4.2%]).
    # Insufficient backtest data to justify sharp filtering change.
    strategy:
      sharp_only: false        # All bookmakers — no evidence sharp filtering helps
      stake_multiplier: 0.5    # 🔴 tier — reduce exposure, keep learning (PC-25-09)
      max_daily_bets: 8        # Per-league daily cap
      auto_bet: false          # 🔴 tier — analysis only
      clv_tracking: true       # Track CLV to detect if edge emerges
      shadow_mode: false       # PC-25-12: shadow mode off by default
      staking_method: flat     # PC-25-15: flat staking (🔴 tier)
    # PC-25-13: Per-league model parameters for Poisson prediction
    # Serie A is a low-scoring league (avg ~2.4 goals/match, defensive style)
    model_params:
      lambda_min: 0.2          # Standard floor
      lambda_max: 3.0          # Lower ceiling (defensive league, fewer goals)
      training_weight: 1.0     # Standard weight
